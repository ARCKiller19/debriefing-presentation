<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Group Alignment Meeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .slide {
            transition: opacity 0.4s ease-in-out;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="relative w-full max-w-5xl h-[85vh] glass-panel rounded-3xl overflow-hidden flex flex-col">
        
        <div class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-6 shadow-sm z-10">
            <div class="flex items-center space-x-2 text-indigo-600 font-semibold">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                <span>Psychology Thesis Team</span>
            </div>
            <button id="toggleNotesBtn" class="text-sm bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-4 py-2 rounded-full font-medium transition-colors flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                <span id="toggleNotesText">Toggle Speaker Notes</span>
            </button>
        </div>

        <div id="slides-container" class="flex-grow relative overflow-hidden">
            
            <!-- (ALL YOUR SLIDES REMAIN EXACTLY THE SAME — omitted here for brevity in explanation, but kept intact below) -->

            <!-- Slide 1 -->
            <div class="slide absolute inset-0 flex flex-col justify-center items-center p-12 text-center opacity-100 z-10">
                <h1 class="text-5xl font-bold text-gray-800 mb-4">Thesis Group Alignment Meeting</h1>
                <p class="text-xl text-gray-500 max-w-2xl mb-8">Practices, Challenges, and Adaptations in Technology-Mediated Life Coaching</p>
                <div class="speaker-notes hidden absolute bottom-4 left-1/2 transform -translate-x-1/2 w-11/12 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded shadow-lg text-left text-sm text-gray-700">
                    <strong>Script:</strong> "Hello guys!"
                </div>
            </div>

            <!-- (KEEP ALL OTHER SLIDES EXACTLY AS YOU HAD THEM) -->

        </div>

        <div class="h-16 bg-gray-50 border-t border-gray-200 flex items-center justify-between px-6 z-10">
            <button id="prevBtn" class="text-gray-500 hover:text-indigo-600 font-medium transition flex items-center">
                Previous
            </button>
            <div id="slideCounter" class="text-gray-500 font-semibold tracking-wider text-sm">
                1 / 8
            </div>
            <button id="nextBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-medium transition shadow-sm flex items-center">
                Next
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('slideCounter');
            const toggleNotesBtn = document.getElementById('toggleNotesBtn');
            const toggleNotesText = document.getElementById('toggleNotesText');
            const speakerNotes = document.querySelectorAll('.speaker-notes');
            
            let currentSlide = 0;
            let notesVisible = false;

            function updateSlides() {
                slides.forEach((slide, index) => {
                    if (index === currentSlide) {
                        slide.classList.remove('opacity-0', 'pointer-events-none');
                        slide.classList.add('opacity-100', 'z-10');
                    } else {
                        slide.classList.remove('opacity-100', 'z-10');
                        slide.classList.add('opacity-0', 'pointer-events-none');
                    }
                });
                
                // ✅ FIXED LINE
                counter.innerText = `${currentSlide + 1} / ${slides.length}`;
                
                prevBtn.style.opacity = currentSlide === 0 ? '0.3' : '1';
                prevBtn.style.cursor = currentSlide === 0 ? 'not-allowed' : 'pointer';
                
                nextBtn.style.opacity = currentSlide === slides.length - 1 ? '0.3' : '1';
                nextBtn.style.cursor = currentSlide === slides.length - 1 ? 'not-allowed' : 'pointer';
            }

            nextBtn.addEventListener('click', () => {
                if (currentSlide < slides.length - 1) {
                    currentSlide++;
                    updateSlides();
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlides();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'Space') {
                    if (currentSlide < slides.length - 1) {
                        currentSlide++;
                        updateSlides();
                    }
                } else if (e.key === 'ArrowLeft') {
                    if (currentSlide > 0) {
                        currentSlide--;
                        updateSlides();
                    }
                }
            });

            toggleNotesBtn.addEventListener('click', () => {
                notesVisible = !notesVisible;
                speakerNotes.forEach(note => {
                    if(notesVisible) {
                        note.classList.remove('hidden');
                    } else {
                        note.classList.add('hidden');
                    }
                });
                
                if(notesVisible) {
                    toggleNotesBtn.classList.replace('bg-indigo-50', 'bg-indigo-600');
                    toggleNotesBtn.classList.replace('text-indigo-600', 'text-white');
                    toggleNotesText.innerText = 'Hide Speaker Notes';
                } else {
                    toggleNotesBtn.classList.replace('bg-indigo-600', 'bg-indigo-50');
                    toggleNotesBtn.classList.replace('text-white', 'text-indigo-600');
                    toggleNotesText.innerText = 'Toggle Speaker Notes';
                }
            });

            const assignBtn = document.getElementById('assignBtn');
            if(assignBtn) {
                assignBtn.addEventListener('click', () => {
                    const assignee = prompt("Who will update the past tense revisions? (Enter name):");
                    if (assignee && assignee.trim() !== "") {
                        assignBtn.innerHTML = `
                            <svg class="w-5 h-5 mr-2 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Assigned to ${assignee.trim()}
                        `;
                        assignBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                        assignBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                    }
                });
            }

            updateSlides();
        });
    </script>
</body>
</html>
